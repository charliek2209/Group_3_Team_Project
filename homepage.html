<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>University Header</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

  <div class="topBar">
    <div class="topLinks">
      <a href="#">1</a>
      <a href="#">2</a>
      <a href="#">3</a>
      <a href="#">4</a>
      <a href="#">5</a>
    </div>
  </div>

  <div class="nav">

  <div class="logo">
    <img src="images/logo.png" alt="Logo">
    <div class="logoText">
      <h1>Name</h1>
    </div>
  </div>

  <div class="headerRight">

    <div class="headerSearch">
      <input type="text" placeholder="Location or Restaurant">
      <button class="searchButton">🔍</button>
    </div>

    <a href="#"><button class="signInButton">Sign In</button></a>

  </div>

</div>

</header>

<section class="bookingSection">

  <div class="bookingBar">

    <div class="bookingInfo">
      <span class="icon">📆</span>
      <select>
        <option>24 Feb 2026</option>
      </select>
    </div>

    <div class="bookingInfo">
      <span class="icon">🕖</span>
      <select>
        <option>19:00</option>
      </select>
    </div>

    <div class="bookingInfo">
      <span class="icon">👤</span>
      <select>
        <option>1 person</option>
        <option>2 people</option>
        <option>3 people</option>
        <option>4 people</option>
        <option>5 people</option>
        <option>6 people</option>
        <option>7 people</option>
      </select>
    </div>

    <button class="bookingButton">Find a table</button>

  </div>

</section>

<section class="restaurantSection">

  <div class="restaurantContainer">

    <div class="restaurants">
      
      <a href="page 1.html" class="restaurantLink">

        <div class="restaurantImage">
          <img src="images/ZAYTONI.jpg" alt="Restaurant">
        </div>

        <div class="restaurantInfo">
          <h2>Zaytoni</h2>

          <div class="rating">
            <span class="score">4.2</span>
            <span class="stars">★★★★☆</span>
            <span class="reviews">(183 reviews)</span>
          </div>

          <p class="category">Quick Bites, Pizza, Middle Eastern · £</p>

          <p class="description">
            “They offer affordable food like shawarma, falafel...”
          </p>
        </div>
      </a>
    </div>

    <div class="restaurants">
      
      <a href="page 2.html" class="restaurantLink">

        <div class="restaurantImage">
          <img src="images/0161-flamin-grill.jpg" alt="Restaurant">
        </div>

        <div class="restaurantInfo">
          <h2>0161 Flamin Grill </h2>

          <div class="rating">
            <span class="score">4.8</span>
            <span class="stars">★★★★★</span>
            <span class="reviews">(970 reviews)</span>
          </div>

          <p class="category">Quick Bites, Fast food · £</p>

          <p class="description">
            “Burger and wrap meals ...”
          </p>
        </div>
      </a>
    </div>
  </div>

</section>

</body>
</html>
