<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>University Header</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

  <div class="topBar">
    <div class="topLinks">
      <a href="#">1</a>
      <a href="#">2</a>
      <a href="#">3</a>
      <a href="#">4</a>
      <a href="#">5</a>
    </div>
  </div>

  <div class="nav">

  <div class="logo">
    <img src="images/logo.png" alt="Logo">
    <div class="logoText">
      <h1>Name</h1>
    </div>
  </div>

  <div class="headerRight">

    <div class="headerSearch">
      <input type="text" placeholder="Location or Restaurant">
    </div>

    <button class="signInButton">Sign In</button>

  </div>

</div>

</header>

<section class="locationSection">
  <h2>Location</h2>
  <div class="locationContainer">

    <iframe
      class="map"
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1187.4402750139272!2d-2.2380544287132023!3d53.47059484686572!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x487bb18d32db948d%3A0x120cd11d3b3af837!2sZaytoni!5e0!3m2!1sen!2suk!4v1772884904462!5m2!1sen!2suk"
      allowfullscreen
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>

    <div class="locationInfo">
      <span class="locationIcon">📍</span>
      <p>127A Oxford Rd, Manchester M1 7DY</p>
      <span class="locationArrow">›</span>
    </div>

  </div>
</section>
