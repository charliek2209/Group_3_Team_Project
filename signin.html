<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>University Header</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

  <div class="nav">
    <div class="logo">
      <img src="images/logo.png" alt="Logo">
      <div class="logoText">
        <h1>Name</h1>
      </div>
    </div>

    <div class="headerSearch">
      <span class="searchIcon">🔍</span>
      <input type="text" placeholder="Location or Restaurant">
    </div>

    <div class="headerRight">
      <a href="#">1</a>
      <a href="#">2</a>
      <a href="#">3</a>
      <a href="signin.html"><button class="signInButton">Sign In</button></a>
    </div>
  </div>

  <div class="subNav">
    <a href="#">📍 Location</a>
    <a href="homepage.html">Home</a>
    <a href="#">2</a>
    <a href="#">3</a>
    <a href="#">4</a>
    <a href="#">5</a>
  </div>

</header>

<section class="signinSection">
  <div class="signinBox">

    <h2>Sign In</h2>
    <p class="signinSubtext">Please enter your details.</p>

    <div class="inputGroup">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="inputGroup">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <div class="signinOptions">
      <label class="rememberMe">
        <input type="checkbox"> Remember me
      </label>
      <a href="#" class="forgotPassword">Forgot password?</a>
    </div>

    <a href="homepage.html"><button class="signinSubmit">Sign In</button></a>

    <p class="signinFooter">Don't have an account? <a href="#">Sign up</a></p>

  </div>
</section>

</body>
</html>
